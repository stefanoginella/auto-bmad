# ═══════════════════════════════════════════════════════════
# Token Pricing — per-model rates for cost inference
# ═══════════════════════════════════════════════════════════
#
# Used when a CLI doesn't report cost natively.
# CLIs that report cost (claude, opencode) use their reported values.
# Copilot uses premium request billing (see [copilot] section below).
#
# [tokens] section — per-token pricing for codex cost inference
# Format: model  input_$/MTok  output_$/MTok  cache_read_$/MTok  cache_write_$/MTok
#   Use "-" for unavailable/not-applicable fields.
#   Lines starting with # are comments. Blank lines are ignored.
#
# Sources (verify periodically):
#   Anthropic: https://platform.claude.com/docs/en/about-claude/pricing
#   OpenAI:    https://developers.openai.com/api/docs/pricing
#   Google:    https://ai.google.dev/gemini-api/docs/pricing
#   Copilot:   https://docs.github.com/en/copilot/about-github-copilot/plans-for-github-copilot
#
# Last updated: 2026-03-26

[tokens]
# Only models used by codex CLI need entries here.
# Claude and OpenCode report cost natively; Copilot uses premium requests.
#
# model                        input   output  cache_read  cache_write
gpt-5.4                        2.50    15.00   0.25        -

[copilot]
# Copilot bills by premium requests, not tokens.
# The JSON output reports premiumRequests consumed per invocation.
# Cost = premiumRequests × (plan_cost / plan_allowance)
#
# Plans:
#   pro:   $10/month, 300 premium requests  → $0.03333/request
#   pro+:  $39/month, 1500 premium requests → $0.02600/request
#
# Set your plan here:
plan = pro
pro_cost = 10.00
pro_requests = 300
pro_plus_cost = 39.00
pro_plus_requests = 1500
