# ═══════════════════════════════════════════════════════════
# Pipeline Configuration — operator-tunable defaults
# ═══════════════════════════════════════════════════════════
# Override per-machine in conf/pipeline.local.conf (gitignored)
# or via environment: AUTO_BMAD_<SECTION>_<KEY> (uppercased)
#   e.g. AUTO_BMAD_TIMEOUTS_PR_SAFETY=3600
#
# Format: key = value  (spaces around = are trimmed)

[timeouts]
# Epic: seconds before assuming CI runner is stuck (backstop, not normal flow)
pr_safety          = 7200
# Epic: seconds between CI status polls
pr_poll_interval   = 30
# Epic: poll cycles to wait for checks to appear before assuming none exist
pr_grace_polls     = 10

[thresholds]
# Soft-fail: steps completing faster than this (seconds) are suspect
min_step_duration  = 5
# Soft-fail: steps producing less output than this (bytes) are suspect
min_log_bytes      = 200
# Minimum successful parallel reviews before triage proceeds
min_reviewers      = 2

[guard]
# Maximum seconds per step before termination (0 = disabled)
max_step_duration  = 2400
# Maximum log output bytes per 10-second window before flagging runaway
max_output_rate    = 300000
# Same file modified this many times = runaway (0 = disabled)
file_churn_threshold = 10

[cache]
# Seconds before pre-flight results are re-checked (0 = always recheck)
preflight_max_age  = 86400
# Seconds before Claude model availability results are re-checked (0 = always recheck)
model_check_max_age = 86400

[monitor]
# Seconds of no output before the activity spinner appears
spinner_quiet      = 2
# Seconds between parallel review launches (0 = instant, reduces resource contention)
parallel_stagger   = 2

[git]
# Branch naming pattern — ${STORY_ID} is substituted at runtime
branch_pattern     = story/${STORY_ID}
# Minimum git version (major.minor)
min_git_version    = 2.25
# Default review mode when --reviews is not specified (full|fast|none)
default_review_mode = full
