# ═══════════════════════════════════════════════════════════
# AI Profiles — define once, reference by @name in steps
# ═══════════════════════════════════════════════════════════
# Format: @name  cli  model  effort  fallback
#   fallback: another @profile or "-" for no fallback
#   On soft-fail: retry once with same profile, then one shot with fallback
#
#   Supported CLIs: claude, codex, opencode, copilot
#
# @name                   cli       model                       effort   fallback
@claude-opus-max          claude    opus                        max      @copilot-opus-max
@claude-opus-high         claude    opus                        high     @copilot-opus-high
@claude-sonnet-high       claude    sonnet                      high     @copilot-sonnet-high
@codex-gpt54-high         codex     gpt-5.4                     high     @copilot-gpt54-high
@codex-gpt54-xhigh        codex     gpt-5.4                     xhigh    @copilot-gpt54-xhigh
@opencode-mimo-max        opencode  opencode/mimo-v2-pro-free   max      @copilot-opus-max

@copilot-opus-max         copilot   claude-opus-4.6             max      @claude-opus-max
@copilot-opus-high        copilot   claude-opus-4.6             high     @claude-opus-high
@copilot-sonnet-high      copilot   claude-sonnet-4.6           high     @claude-sonnet-high
@copilot-gpt54-high       copilot   gpt-5-4                     high     @codex-gpt54-high
@copilot-gpt54-xhigh      copilot   gpt-5-4                     xhigh    @codex-gpt54-xhigh
@copilot-gemini-high      copilot   gemini-3.1-pro-preview      high     @claude-opus-high
@copilot-gemini-max       copilot   gemini-3.1-pro-preview      max      @claude-opus-max

